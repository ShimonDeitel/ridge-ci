name: Ridge
options:
  bundleIdPrefix: com.shimondeitel.ridge
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Ridge:
    type: application
    platform: iOS
    sources:
      - path: Ridge
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.ridge
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Ridge/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  RidgeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: RidgeTests
      - path: Ridge.storekit
    dependencies:
      - target: Ridge
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.ridge.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  RidgeUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: RidgeUITests
    dependencies:
      - target: Ridge
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.ridge.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Ridge:
    build:
      targets:
        Ridge: all
        RidgeTests: [test]
        RidgeUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Ridge.storekit
    test:
      config: Debug
      storeKitConfiguration: Ridge.storekit
      targets:
        - RidgeTests
        - RidgeUITests
    archive:
      config: Release
